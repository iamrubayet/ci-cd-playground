workflow:
  rules:
    - if: $CI_COMMIT_BRANCH != "main" && $CI_PIPELINE_SOURCE != "merge_request_event"
      when: never
    - when: always


stages:
  - test
  - build
  - deploy


variables:
  image_repository: docker.io/my-docker-id/myapp
  image_tag: v1.0


run_tests:
  stage: test
  before_script:
    - echo "Setting up environment for tests..."
  script:
    - echo "Running tests for $MICRO_SERVICE_NAME..."
  after_script:
    - echo "Cleaning up after tests..."

build_image:
  only:
    - main
  stage: build
  script:
    - echo "Building Docker image..."
    - echo "Tagging the docker image $image_repository:$image_tag ..."

push_image:
  only:
    - main
  stage: build
  needs:
    - build_image
  script:
    - echo "Pushing Docker image to registry..."
    - echo "Pushing docker image $image_repository:$image_tag  to registry..."

deploy_image:
  only:
    - main
  stage: deploy
  script:
    - echo "Deploying docker image $image_repository:$image_tag to dev server..."       
    - echo "Deploying docker image to $DEPLOYMENT_ENVIRONMENT using the following configuration file - $PROPERTIES_FILE..."
    - cat $PROPERTIES_FILE

